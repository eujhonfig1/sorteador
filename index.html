<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Sorteador 🎲</title>
</head>
<body>
    <img src="./assets/img-trevo.png" alt="imagem-de-um-trevo-de-4-folhas">

    <h2>Sortear um número</h2>
    <div class="input-minmax">
        <input type="number" placeholder="1º nº" class="input-min">
        <input type="number" placeholder="2º nº" class="input-max">
    </div>

    <button class="btn-sort">Sortear</button>

    <div class="result">
        <p>Número Sorteado:</p>
        <input id="result" type="number" disabled>
    </div>

    <div id="custom-alert" class="modal-overlay hidden">
        <div class="modal-box">
            <p id="modal-message">Mensagem de erro aqui</p>
            <button id="close-modal">OK</button>
        </div>
    </div>

</body>
</html>
